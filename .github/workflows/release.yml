name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'

      - name: Install UPX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y upx

      - name: Build amd64
        env:
          GOEXPERIMENT: jsonv2
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: amd64
        run: go build -ldflags "-s -w -X github.com/wyx2685/v2node/cmd.version=${{ github.ref_name }}" -o v2node-linux-amd64 .

      - name: Build arm64
        env:
          GOEXPERIMENT: jsonv2
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: arm64
        run: go build -ldflags "-s -w -X github.com/wyx2685/v2node/cmd.version=${{ github.ref_name }}" -o v2node-linux-arm64 .

      - name: Compress with UPX
        run: |
          upx --best --lzma v2node-linux-amd64
          # UPX doesn't support cross-arch compression for arm64,
          # so we only compress amd64 here. arm64 stays as-is but
          # will be zipped for smaller download.

      - name: Package amd64
        run: |
          mkdir -p build_amd64
          cp v2node-linux-amd64 build_amd64/v2node
          cd build_amd64
          zip ../v2node-linux-64.zip v2node

      - name: Package arm64
        run: |
          mkdir -p build_arm64
          cp v2node-linux-arm64 build_arm64/v2node
          cd build_arm64
          zip ../v2node-linux-arm64-v8a.zip v2node

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            v2node-linux-64.zip
            v2node-linux-arm64-v8a.zip
            v2node-linux-amd64
            v2node-linux-arm64
          generate_release_notes: true
